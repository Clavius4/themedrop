##
## ThemeDrop — production VPS compose
## Usage:
##   1. Copy .env.prod.example → .env.prod and fill in real secrets
##   2. docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
##
## Replace <YOUR_DOMAIN> with your actual domain in Nginx / Traefik labels.
##

name: themedrop-prod

services:

  # ── 1. PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: themedrop-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./scripts/supabase-setup.sql:/docker-entrypoint-initdb.d/02_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 20
    # Do NOT expose 5432 in prod — only internal access
    expose:
      - "5432"

  # ── 2. PostgREST ─────────────────────────────────────────────────
  rest:
    image: postgrest/postgrest:v12.0.2
    container_name: themedrop-rest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_SCHEMAS: public
      PGRST_LOG_LEVEL: warn
    expose:
      - "3000"

  # ── 3. MinIO ─────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: themedrop-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── 4. MinIO bucket init ─────────────────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    container_name: themedrop-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/previews &&
        mc mb --ignore-existing local/downloads &&
        mc anonymous set public local/previews &&
        mc anonymous set public local/downloads
      "
    restart: on-failure

  # ── 5. Nginx gateway + TLS (via certbot or Traefik) ─────────────
  gateway:
    image: nginx:alpine
    container_name: themedrop-gateway
    restart: always
    ports:
      - "54321:54321"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - rest
      - minio

  # ── 6. ThemeDrop app ─────────────────────────────────────────────
  app:
    build:
      context: .
      target: runner
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: themedrop-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_INTERNAL_URL: http://gateway:54321
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_REGION: us-east-1
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      gateway:
        condition: service_started

volumes:
  pg_data:
  minio_data:
