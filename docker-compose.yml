##
## ThemeDrop — local full-stack compose
## Usage: docker compose up --build
## App:     http://localhost:3000
## Admin:   http://localhost:3000/admin  (password: admin)
## API GW:  http://localhost:54321
## MinIO:   http://localhost:9000        (minioadmin / minioadmin)
## MinIO UI:http://localhost:9001
##

name: themedrop

# ─── reusable JWT values (DO NOT use in production) ──────────────
x-jwt: &jwt-secret  super-secret-jwt-token-with-at-least-32-characters-long
x-anon: &anon-key   eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7urOoD9bMDuN6ndvq4xPZ0vy7GHESTiLT-U
x-svc:  &svc-key    eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl196z2-SBc0

services:

  # ── 1. PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: themedrop-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./scripts/supabase-setup.sql:/docker-entrypoint-initdb.d/02_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── 2. PostgREST (Supabase-compatible REST API) ──────────────────
  rest:
    image: postgrest/postgrest:v12.0.2
    container_name: themedrop-rest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:postgres@db:5432/postgres
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: *jwt-secret
      PGRST_DB_SCHEMAS: public
      PGRST_ADMIN_SERVER_PORT: "3001"
      PGRST_LOG_LEVEL: warn

  # ── 3. MinIO (S3-compatible object storage) ──────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: themedrop-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── 4. MinIO init — creates previews + downloads buckets ─────────
  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    container_name: themedrop-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/previews &&
        mc mb --ignore-existing local/downloads &&
        mc anonymous set public local/previews &&
        mc anonymous set public local/downloads &&
        echo 'MinIO buckets ready.'
      "
    restart: on-failure

  # ── 5. Nginx API gateway ─────────────────────────────────────────
  gateway:
    image: nginx:alpine
    container_name: themedrop-gateway
    restart: unless-stopped
    ports:
      - "54321:54321"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - rest
      - minio

  # ── 6. ThemeDrop Next.js app ─────────────────────────────────────
  app:
    build:
      context: .
      target: runner
      args:
        # NEXT_PUBLIC_* vars are baked in at build time
        NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
        NEXT_PUBLIC_SUPABASE_ANON_KEY: *anon-key
    container_name: themedrop-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Server-side DB access (via internal Docker network)
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: *anon-key
      SUPABASE_SERVICE_ROLE_KEY: *svc-key
      SUPABASE_INTERNAL_URL: http://gateway:54321
      # S3 (MinIO) — used server-side for signed upload URLs
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_REGION: us-east-1
      # Admin portal auth
      ADMIN_PASSWORD: admin
      ADMIN_TOKEN: local-dev-token-change-in-production
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      gateway:
        condition: service_started

volumes:
  pg_data:
  minio_data:
