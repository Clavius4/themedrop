events { worker_connections 1024; }

http {
  # ── PostgREST (Supabase-compatible REST API) ──────────────────
  upstream rest    { server rest:3000; }
  # ── MinIO public endpoint (file downloads) ────────────────────
  upstream storage { server minio:9000; }

  server {
    listen 54321;

    # REST API — Supabase JS client expects /rest/v1
    location ~ ^/rest/v1(.*) {
      proxy_pass         http://rest$1;
      proxy_set_header   Host             $host;
      proxy_set_header   X-Real-IP        $remote_addr;
      proxy_set_header   Authorization    $http_authorization;
      proxy_set_header   apikey           $http_apikey;
      proxy_pass_header  Server;
    }

    # Storage pass-through (for public file serving via MinIO)
    location ~ ^/storage/(.*) {
      proxy_pass       http://storage/$1;
      proxy_set_header Host $host;
    }

    # Health check
    location /health {
      access_log off;
      return 200 'ok';
      add_header Content-Type text/plain;
    }
  }
}
